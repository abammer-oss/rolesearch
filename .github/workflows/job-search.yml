name: RoleSearch — Automated Job Search

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours
  workflow_dispatch:          # manual trigger anytime from GitHub UI
    inputs:
      force_rescan:
        description: 'Force re-score all jobs (ignore existing matches)'
        required: false
        default: 'false'
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # opt into Node.js 24 ahead of June 2026 deadline

jobs:
  search:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # commit generated documents back to repo
      issues: write     # open GitHub Issues for new matches

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore job database
        uses: actions/cache@v4
        with:
          path: rolesearch.db
          key: rolesearch-db-${{ github.run_id }}
          restore-keys: rolesearch-db-

      - name: Run job search and create issues
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          FORCE_RESCAN: ${{ inputs.force_rescan || 'false' }}
        run: python main.py ci

      - name: Commit generated documents
        run: |
          git config user.name  "rolesearch-bot"
          git config user.email "rolesearch-bot@users.noreply.github.com"
          git add output/ 2>/dev/null || true
          git diff --staged --quiet || \
            git commit -m "chore: add generated job documents [skip ci]"
          git push || true
